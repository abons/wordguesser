AutoName: Word Guesser

Summary: Tiny native Wordle-style word game

Description: |-
    A tiny, native Android word-guessing game in the Wordle style, written in pure
    Kotlin using only the Android framework — no AppCompat, Compose, Material, or
    third-party runtime libraries. The whole UI is built in code, so the APK stays
    around 72&nbsp;KB.

    Features:

    * Guess the hidden word in six tries, with green / yellow / gray letter hints.
    * Many languages via downloadable word lists (English, Nederlands, Français,
      Deutsch, Español and more), fetched on demand and cached offline.
    * Variable word length (4–8), with the board resizing to fit.
    * Strict mode (reject non-words) and hard mode (numeric hints instead of colours).
    * A separate daily puzzle for each word length, with an optional public leaderboard.
    * Per-language, per-setting statistics.
    * Accent folding with accented display on match, and language-specific extra keys
      (German ß, Nordic Æ/Ø, Polish Ł, Croatian Đ).
    * Optional word lookup (translate / define) via installed apps.

    Word lists are downloaded from their own upstream sources at runtime and are not
    bundled in the app.

